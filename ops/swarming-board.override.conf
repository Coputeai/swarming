# Resource limits for the board/API service on the SHARED box (copute.ai +
# Miru production live here too — one viral day must not take them down).
# PREPPED, NOT DEPLOYED. Install:
#   sudo mkdir -p /etc/systemd/system/swarming-board.service.d
#   sudo cp ops/swarming-board.override.conf /etc/systemd/system/swarming-board.service.d/override.conf
#   sudo systemctl daemon-reload && sudo systemctl restart swarming-board
[Service]
MemoryMax=768M
MemoryHigh=512M
CPUQuota=75%
TasksMax=256
# node + sqlite need nothing outside the app dir and its DB
NoNewPrivileges=true
