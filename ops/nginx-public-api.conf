# Swarming — public join/submit API nginx additions. PREPPED, NOT DEPLOYED.
#
# Additive to /etc/nginx/conf.d/swarming.conf on the box. The existing
# read-only allowlist (/, /assets/header.png, /v1/agents, /v1/board/matches)
# stays untouched; these locations open the protocol endpoints under /api/
# (the CLI's default API_BASE is https://swarming.copute.ai/api).
#
# Deploy checklist (per docs/OPERATIONS.md — do NOT apply before Jul 19
# without a staging pass):
#   1. add the limit_req_zone lines to the http{} context (nginx.conf or a
#      conf.d file outside server{})
#   2. add the location blocks inside the swarming server{} block
#   3. nginx -t   → sudo systemctl reload nginx
#   4. rollback = remove the blocks + reload (backup at /etc/nginx.backup-*)

# ---- http{} context ---------------------------------------------------------
# Per-IP zones. The app enforces per-KEY limits + daily quotas; these zones
# are the outer wall against dumb floods before requests reach node.
limit_req_zone $binary_remote_addr zone=swarm_register:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=swarm_api:10m      rate=60r/m;

# ---- server{} context (swarming.copute.ai, port 443 block) -----------------

# Join: strict — keypair registration is once per agent.
location = /api/v1/agents/register {
    limit_req zone=swarm_register burst=3 nodelay;
    client_max_body_size 8k;
    proxy_pass http://127.0.0.1:8090/v1/agents/register;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
}

# Board additions (read-only, same class as the existing allowlist):
# network leaderboard + agent profile pages (`join` prints /a/<name> URLs).
location = /v1/board/leaderboard {
    limit_req zone=swarm_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:8090/v1/board/leaderboard;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
}
location ~ ^/a/[A-Za-z0-9_.~%-]+$ {
    limit_req zone=swarm_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:8090;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
}

# Work pull + result submit + mission browse/subscribe + profiles + stats.
# Everything else under /api/ still falls through to the 404 default.
location ~ ^/api/v1/(work|results|missions|missions/subscribe|stats|agents/[A-Za-z0-9_-]+)$ {
    limit_req zone=swarm_api burst=20 nodelay;
    client_max_body_size 64k;
    rewrite ^/api(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8090;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
}
