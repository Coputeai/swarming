# Security headers for swarming.copute.ai — PREPPED, NOT DEPLOYED.
# Include from inside the server{} block of the site's conf
# (e.g. `include /etc/nginx/conf.d/swarming-security-headers.inc;` — rename on
# the box so conf.d doesn't auto-load it as a standalone server block).
#
# Found missing in the 2026-07-12 security pass: no HSTS, no X-Content-Type-
# Options, no X-Frame-Options, and the nginx version is advertised.
#
# `always` so the headers are also sent on 404/429 responses.

add_header Strict-Transport-Security "max-age=31536000" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# In the http{} context (nginx.conf or a conf.d file), also set:
#   server_tokens off;
#
# NOTE for the deploying session: add_header directives are NOT inherited if a
# location block declares its own add_header — check existing locations before
# assuming coverage. Deploy per docs/OPERATIONS.md recipe; needs Lawrence's
# fresh go (shared production box).
